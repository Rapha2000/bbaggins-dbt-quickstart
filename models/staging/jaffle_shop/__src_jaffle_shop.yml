sources: 
    - name: jaffle_shop
      database: raw
      schema: jaffle_shop
      description: This is a replica of the Snowflake jaffle_shop schema from raw database used by our app
      tables:
          - name: customers
            description: Raw customers data.
            columns:
              - name: id
                description: Primary key for customers data
                data_tests:
                  - unique
                  - not_null

          - name: orders
            description: Raw orders data.
            columns:
              - name: id
                description: Primary key for orders data
                data_tests:
                  - unique
                  - not_null
