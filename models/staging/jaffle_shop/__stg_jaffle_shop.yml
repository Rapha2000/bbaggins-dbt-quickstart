models:
  - name: stg_jaffle_shop__customers
    description: the grain of this table is one unique customer per row
    columns:
      - name: customer_id # good practice to test unicity and not null on PK
        description: Primary key for the customers table
        data_tests:
          - unique
          - not_null
          
  - name: stg_jaffle_shop__orders
    description: One order per row
    columns:
      - name: order_id
        description: Primary key for the orders table
        data_tests:
          - unique
          - not_null

      - name: order_status
        description: "{{ doc('order_status') }}"
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - completed
                  - shipped
                  - placed
                  - return_pending
                  - returned

      - name: customer_id # we test that every customer in the orders table exists in the customers table
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id